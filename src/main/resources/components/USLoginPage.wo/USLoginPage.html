<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<title>Innskráning | <wo:str value="$siteName" /></title>
		<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover"/>
		<meta http-equiv="X-UA-Compatible" content="ie=edge"/>
		<wo:stylesheet namespace="hafnium" filename="tabler/css/tabler.min.css" />
	</head>
	<body class="d-flex flex-column">
		<script>
			document.addEventListener("DOMContentLoaded", function() {
				document.getElementById('username').focus();
			});
		</script>
		<div class="page page-center">
			<div class="container container-tight py-4">
				<div class="text-center mb-4">
					<a href="." class="navbar-brand navbar-brand-autodark">
						<wo:str value="$siteName" />
					</a>
				</div>
				<div class="card card-md">
					<div class="card-body">
						<h2 class="h2 text-center mb-4">Innskráning</h2>
						<wo:form autocomplete="off">
							<div class="mb-3">
								<label class="form-label">Notandanafn</label>
								<wo:textfield value="$username" class="form-control" placeholder="Notandanafn" autocomplete="off" id="username" />
							</div>
							<div class="mb-2">
								<label class="form-label">Lykilorð</label>
								<wo:password value="$password" class="form-control" placeholder="Lykilorð" autocomplete="off" />
							</div>
							<div class="form-footer">
								<wo:submit action="$login" class="btn btn-primary w-100" value="Innskráning" />
							</div>
						</wo:form>
					</div>
				</div>
			</div>
		</div>
		<wo:script namespace="hafnium" filename="tabler/js/tabler.min.js" />
	</body>
</html>
