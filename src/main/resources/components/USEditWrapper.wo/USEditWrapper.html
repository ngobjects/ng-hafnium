<wo:USEditLook>
	<wo:AjaxUpdateContainer id="main">
		<wo:form enctype="multipart/form-data">
			<div class="row">
				<div class="col">
					<div class="card">
						<div class="card-header">
							<h3 class="card-title"><wo:link action="$openListPage"><wo:str value="$viewDefinition.icelandicName" /></wo:link> / <wo:str value="$selectedObject" /></h3>
						</div>
						<div class="card-body d-flex justify-content-between align-items-center">
							<wo:link action="$returnToCallingComponent" class="btn">Til baka</wo:link>
							<div>
								<wo:USOperationMenu selectedObject="$selectedObject" />
								<wo:submit action="$deleteObject" class="btn btn-outline-danger" value="Eyða" onclick="return confirm('Ertu viss um að þú viljir eyða þessari færslu?')" />
								<wo:submit action="$saveChangesAndReturn" class="btn btn-outline-secondary" value="Vista og loka" />
								<wo:AjaxSubmitButton action="$saveChanges" updateContainerID="main" class="btn btn-primary" value="Vista" />
							</div>
						</div>
						<div class="card-body">
							<wo:switch componentName="$displayComponentName" callingComponent="$callingComponent" selectedObject="$selectedObject" />
						</div>
					</div>
				</div>
			</div>
		</wo:form>
	</wo:AjaxUpdateContainer>
</wo:USEditLook>
